name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Immo.Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Immo.Web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/immo-web:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/immo-web:latest

      - name: Build and push Immo.Crawler
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Immo.Crawler/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/immo-crawler:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/immo-crawler:latest

      - name: Build and push Immo.Parser
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Immo.Parser/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/immo-parser:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/immo-parser:latest
